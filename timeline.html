<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上帝在日本與台灣的工作</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── 基礎重置 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS 變數 ── */
    :root {
      --jp: #534AB7;
      --jp-light: #EEEDFE;
      --jp-dark: #3C3489;
      --jp-mid: #7F77DD;
      --tw: #0F6E56;
      --tw-light: #E1F5EE;
      --tw-dark: #085041;
      --tw-mid: #1D9E75;
      --bg: #FAFAF8;
      --bg2: #F3F2EE;
      --bg3: #ECEAE4;
      --text: #1A1916;
      --text2: #5A5852;
      --text3: #9A9890;
      --border: rgba(0,0,0,0.10);
      --border2: rgba(0,0,0,0.18);
      --radius: 12px;
      --radius-sm: 8px;
      --spine-w: 2px;
      --font-body: 'Noto Sans TC', sans-serif;
      --font-display: 'Noto Serif TC', serif;
    }

    /* ── 全域 ── */
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
    }

    /* ── 頁首 ── */
    header {
      background: var(--text);
      color: #fff;
      padding: 3rem 1.5rem 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 39px,
          rgba(255,255,255,0.04) 39px,
          rgba(255,255,255,0.04) 40px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 39px,
          rgba(255,255,255,0.04) 39px,
          rgba(255,255,255,0.04) 40px
        );
    }
    header > * { position: relative; }
    .header-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 0.75rem;
      font-family: var(--font-body);
      font-weight: 500;
    }
    header h1 {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 600;
      line-height: 1.35;
      color: #fff;
      margin-bottom: 1rem;
    }
    header p {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.55);
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── 圖例列 ── */
    .legend-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      padding: 1rem 1.5rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-sep {
      width: 1px; height: 20px;
      background: var(--border2);
    }
    .legend-count {
      font-size: 0.75rem;
      color: var(--text3);
    }

    /* ── 欄位標題 ── */
    .col-headers {
      display: grid;
      grid-template-columns: 1fr 80px 1fr;
      max-width: 860px;
      margin: 0 auto;
      padding: 1.25rem 1rem 0;
      gap: 0;
    }
    .col-hd {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 0 12px;
    }
    .col-hd.left { text-align: right; color: var(--jp-dark); }
    .col-hd.right { text-align: left; color: var(--tw-dark); }
    .col-hd.center { text-align: center; }

    /* ── 時間軸主體 ── */
    .timeline-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 1rem 1rem 4rem;
      position: relative;
    }
    .spine {
      position: absolute;
      left: calc(50% + 0px);
      top: 1rem;
      bottom: 0;
      width: var(--spine-w);
      background: var(--border2);
      transform: translateX(-50%);
    }

    /* ── 時間軸列 ── */
    .tl-row {
      display: grid;
      grid-template-columns: 1fr 80px 1fr;
      align-items: start;
      margin-bottom: 8px;
      gap: 0;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tl-row:nth-child(1)  { animation-delay: 0.05s; }
    .tl-row:nth-child(2)  { animation-delay: 0.10s; }
    .tl-row:nth-child(3)  { animation-delay: 0.15s; }
    .tl-row:nth-child(4)  { animation-delay: 0.20s; }
    .tl-row:nth-child(5)  { animation-delay: 0.25s; }
    .tl-row:nth-child(6)  { animation-delay: 0.30s; }
    .tl-row:nth-child(7)  { animation-delay: 0.35s; }
    .tl-row:nth-child(8)  { animation-delay: 0.40s; }
    .tl-row:nth-child(9)  { animation-delay: 0.45s; }
    .tl-row:nth-child(10) { animation-delay: 0.50s; }
    .tl-row:nth-child(11) { animation-delay: 0.55s; }
    .tl-row:nth-child(12) { animation-delay: 0.60s; }

    .cell-left  { padding: 0 14px 0 0; text-align: right; }
    .cell-right { padding: 0 0 0 14px; text-align: left; }
    .cell-mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding-top: 12px;
      position: relative;
      z-index: 1;
    }

    /* 年份標籤 */
    .yr-badge {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text3);
      white-space: nowrap;
      line-height: 1;
      background: var(--bg);
      padding: 2px 4px;
      border-radius: 4px;
    }

    /* 節點圓點 */
    .dot {
      width: 15px; height: 15px;
      border-radius: 50%;
      border: 2.5px solid var(--bg);
      outline: 2px solid transparent;
      outline-offset: 1px;
      cursor: pointer;
      transition: transform 0.2s, outline-color 0.2s;
      flex-shrink: 0;
    }
    .dot:hover { transform: scale(1.35); }
    .dot.active { transform: scale(1.4); outline-color: currentColor; }

    /* ── 事件卡片 ── */
    .ev-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 13px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 4px;
      text-align: inherit;
    }
    .ev-card:hover {
      border-color: var(--border2);
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .ev-card.active-jp {
      border-color: var(--jp-mid);
      box-shadow: 0 0 0 2px rgba(83,74,183,0.15);
    }
    .ev-card.active-tw {
      border-color: var(--tw-mid);
      box-shadow: 0 0 0 2px rgba(15,110,86,0.15);
    }
    .ev-title {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.45;
    }
    .ev-sub {
      font-size: 0.7rem;
      color: var(--text3);
      margin-top: 3px;
    }
    .ev-flag {
      display: inline-block;
      font-size: 0.65rem;
      padding: 1px 7px;
      border-radius: 20px;
      margin-bottom: 5px;
      font-weight: 500;
    }

    /* 佔位（left-only / right-only） */
    .tl-row.left-only  .cell-right { visibility: hidden; pointer-events: none; }
    .tl-row.right-only .cell-left  { visibility: hidden; pointer-events: none; }

    /* ── 詳細資訊面板 ── */
    .detail-panel {
      max-width: 860px;
      margin: 0 auto 2rem;
      padding: 0 1rem;
    }
    .detail-box {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      min-height: 100px;
      transition: border-color 0.2s;
    }
    .detail-box.jp { border-left: 4px solid var(--jp); }
    .detail-box.tw { border-left: 4px solid var(--tw); }
    .detail-empty {
      font-size: 0.875rem;
      color: var(--text3);
      font-style: italic;
      text-align: center;
      padding: 1.5rem 0;
    }
    .d-tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 0.6rem;
      font-weight: 500;
    }
    .detail-box h2 {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }
    .detail-box .d-sub {
      font-size: 0.78rem;
      color: var(--text3);
      margin-bottom: 0.75rem;
    }
    .detail-box p {
      font-size: 0.875rem;
      color: var(--text2);
      line-height: 1.85;
    }

    /* ── 頁尾 ── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.75rem;
      color: var(--text3);
      border-top: 1px solid var(--border);
      background: var(--bg2);
    }

    /* ── 手機響應式 ── */
    @media (max-width: 600px) {
      header { padding: 2rem 1rem 1.75rem; }
      .col-headers { grid-template-columns: 1fr 56px 1fr; padding: 1rem 0.5rem 0; }
      .tl-row { grid-template-columns: 1fr 56px 1fr; }
      .cell-left  { padding-right: 8px; }
      .cell-right { padding-left: 8px; }
      .cell-mid { padding-top: 10px; }
      .yr-badge { font-size: 0.6rem; }
      .ev-title { font-size: 0.75rem; }
      .ev-sub   { font-size: 0.65rem; }
      .ev-card  { padding: 8px 10px; }
      .detail-box { padding: 1rem 1.1rem; }
      .detail-box h2 { font-size: 0.95rem; }
      .detail-box p  { font-size: 0.825rem; }
      .timeline-wrap { padding: 0.75rem 0.5rem 3rem; }
      .detail-panel  { padding: 0 0.5rem; }
      .legend-bar { gap: 1rem; padding: 0.75rem 1rem; }
    }
  </style>
</head>
<body>

<!-- ── 頁首 ── -->
<header>
  <p class="header-eyebrow">亞洲基督宗教史</p>
  <h1>那些與中壢靈糧堂日本短宣隊相關的事：<br>上帝在日本與台灣的工作</h1>

<div class="legend-bar">

<footer>

<script>
  const JP = '#534AB7', TW = '#0F6E56';
  const JP_BG = '#EEEDFE', JP_TX = '#3C3489';
  const TW_BG = '#E1F5EE', TW_TX = '#085041';

  const events = [
    {
      year: 1549, side: 'left', color: JP, bg: JP_BG, tx: JP_TX,
      tag: '日本', sub: '耶穌會傳教開始',
      title: '方濟各·沙勿略抵達日本',
      desc: '耶穌會傳教士方濟各·沙勿略（Francis Xavier）於1549年8月登陸鹿兒島，成為首位進入日本的基督宗教傳教士。他在日本停留約兩年，奠定了早期日本教會的基礎。數十年內，日本基督徒人數成長至逾三十萬人，分布在九州各地與京都周邊。'
    },
    {
      year: 1563, side: 'left', color: JP, bg: JP_BG, tx: JP_TX,
      tag: '日本', sub: '首位基督徒大名',
      title: '大村純忠受洗',
      desc: '大村純忠成為日本第一位受洗的大名（封建領主），開放領地讓耶穌會傳教士自由活動，並驅逐境內佛教僧侶。他的歸信帶動大批領民入教，也使長崎港成為基督教對外貿易的重要據點，為日本天主教的發展提供了關鍵的政治支撐。'
    },
    {
      year: 1597, side: 'left', color: JP, bg: JP_BG, tx: JP_TX,
      tag: '日本', sub: '首次大規模迫害',
      title: '長崎二十六聖人殉道',
      desc: '豐臣秀吉下令將26名基督徒——包括6名方濟各會傳教士與20名日本信徒——釘十字架處決於長崎西坂。這是日本史上首次大規模處決基督徒，標誌著官方態度的急劇轉變。1862年，教宗庇護九世將他們列為聖人，西坂至今仍是重要的天主教朝聖地。'
    },
    {
      year: 1622, side: 'left', color: JP, bg: JP_BG, tx: JP_TX,
      tag: '日本', sub: '單日處決五十五人',
      title: '長崎大殉教',
      desc: '德川幕府在長崎單日處決55名基督徒，部分以火刑，部分以斬首。這是日本歷史上規模最大的單日殉道事件，是幕府系統性滅絕基督宗教運動的一部分。倖存的信徒被迫轉入地下，成為秘密保守信仰的「隱蔽切支丹」（Kakure Kirishitan）。'
    },
    {
      year: 1593, side: 'right', color: TW, bg: TW_BG, tx: TW_TX,
      tag: '台灣', sub: '日本派遣使節來台',
      title: '豐臣秀吉遣高山國師來台',
      desc: '1593年，日本太閤豐臣秀吉派遣使者高山國師攜帶信件前來台灣，當時日本人稱台灣為「高山國」，要求台灣臣服納貢。但因找不到統一的台灣統治者，任務失敗。'
    },
    {
      year: 1616, side: 'right', color: TW, bg: TW_BG, tx: TW_TX,
      tag: '台灣', sub: '德川幕府征台',
      title: '德川家康派村山等安征台失敗',
      desc: '1616年，德川幕府將軍德川家康派遣村山等安率領13艘船隻征討台灣，企圖將台灣納入日本保護傘並作為貿易據點。結果船隊途中遭遇颱風與原住民反擊，損失慘重，無功而返。'
    },
    {
      year: 1624, side: 'right', color: TW, bg: TW_BG, tx: TW_TX,
      tag: '台灣', sub: '福音首入台灣',

      desc: '荷蘭東印度公司（VOC）在今台南安平一帶建立熱蘭遮城，並攜帶改革宗（喀爾文派）牧師來台灣。這開啟了台灣最早有組織的基督宗教宣教活動，主要對象為居住在西南平原的西拉雅族原住民。荷蘭的殖民統治為宣教提供了行政保護與資源。'
    },
    {
      year: 1636, side: 'right', color: TW, bg: TW_BG, tx: TW_TX,

    },
    {
      year: 1662, side: 'right', color: TW, bg: TW_BG, tx: TW_TX,

      title: '鄭成功驅逐荷蘭人',
      desc: '明朝遺臣鄭成功（國姓爺）在圍攻九個月後驅逐荷蘭人，結束荷蘭在台三十八年的殖民統治。改革宗宣教工作就此中斷，歸信的原住民失去牧靈支援，基督宗教在台灣幾乎銷聲匿跡，直至十九世紀西方宣教士再度抵台。'
    },
    {
      year: 1683, side: 'right', color: TW, bg: TW_BG, tx: TW_TX,
      tag: '台灣', sub: '清領時期開始',

    },
    {
      year: 1865, side: 'left', color: JP, bg: JP_BG, tx: JP_TX,
      tag: '日本', sub: '二百年秘密信仰重見天日',
      title: '浦上隱蔽切支丹現身',
      desc: '法國傳教士在長崎建成大浦天主堂後不久，一群浦上村民悄悄前來，表明他們已秘密保守信仰逾兩百年。這一「信徒發現」（Découverte des chrétiens）事件震驚全世界，被視為近代日本天主教史上最感人的時刻之一，後來被列為聯合國教科文組織世界文化遺產的一部分。'
    },
    {
      year: 1865, side: 'right', color: TW, bg: TW_BG, tx: TW_TX,
      tag: '台灣', sub: '英國長老會宣教開始',
      title: '馬雅各醫師抵台',
      desc: '英國長老會宣教士馬雅各（James Laidlaw Maxwell）抵達台南，成為近代台灣新教宣教的先驅。他開設診所與教堂，確立了醫療宣教並進的模式，深刻影響台灣宣教史的發展方向。他後來遷往府城（今台南市區），持續拓展宣教範圍。'
    },
    {
      year: 1872, side: 'left', color: JP, bg: JP_BG, tx: JP_TX,
      tag: '日本', sub: '日本第一間新教教會',
      title: '1872/3/10橫濱海岸教會創立',
      desc: '明治5年的1872年3月10日(也就是馬偕牧師抵達淡水的隔天)，橫濱海岸教會（Yokohama Kaigan Church）正式成立，被視為日本第一間由日本人組成的新教教會。在美國傳教士詹姆士·巴拉（James Ballagh）的協助下，十一名日本信徒受洗並組成會眾。這一歷史性時刻標誌著基督宗教在日本正式生根，走向本土化的新階段。'

    {
      year: 1872, side: 'left', color: JP, bg: JP_BG, tx: JP_TX,

  /* ── 依年代排序 ── */
  const sorted = [...events].sort((a, b) => a.year - b.year);
  const years  = [...new Set(sorted.map(e => e.year))].sort((a, b) => a - b);

  const container = document.getElementById('tl-rows');
  let activeId = null;

  /* ── 建立列 ── */
  years.forEach(yr => {
    const left  = sorted.find(e => e.year === yr && e.side === 'left');
    const right = sorted.find(e => e.year === yr && e.side === 'right');
    const cls   = left && right ? '' : left ? 'left-only' : 'right-only';
    const id_l  = left  ? `ev-${yr}-l` : null;
    const id_r  = right ? `ev-${yr}-r` : null;
    const dotEv = left || right;

    const dotClick = left
      ? `selectEv('${id_l}')`
      : `selectEv('${id_r}')`;

    const leftHTML = left ? `
      <div class="ev-card" id="${id_l}" onclick="selectEv('${id_l}')">
        <span class="ev-flag" style="background:${left.bg};color:${left.tx}">${left.tag}</span>
        <div class="ev-title">${left.title}</div>
        <div class="ev-sub">${left.sub}</div>
      </div>` : '';

    const rightHTML = right ? `
      <div class="ev-card" id="${id_r}" onclick="selectEv('${id_r}')">
        <span class="ev-flag" style="background:${right.bg};color:${right.tx}">${right.tag}</span>
        <div class="ev-title">${right.title}</div>
        <div class="ev-sub">${right.sub}</div>
      </div>` : '';

    const row = document.createElement('div');
    row.className = `tl-row ${cls}`;
    row.innerHTML = `
      <div class="cell-left">${leftHTML}</div>
      <div class="cell-mid">
        <div class="yr-badge">${yr}</div>
        <div class="dot"
             style="background:${dotEv.color};color:${dotEv.color}"
             onclick="${dotClick}"
             role="button"
             aria-label="${yr}年事件"></div>
      </div>
      <div class="cell-right">${rightHTML}</div>
    `;
    container.appendChild(row);
  });

  /* ── 點選事件 ── */
  function selectEv(id) {
    /* 清除前一個 active */
    if (activeId) {
      const prev = document.getElementById(activeId);
      if (prev) prev.classList.remove('active-jp', 'active-tw');
      /* 清除節點點的 active */
      const [, yr, side] = activeId.split('-');
      const dotEl = document.querySelector(`.cell-mid`);
    }

    activeId = id;
    const el = document.getElementById(id);
    if (!el) return;

    const [, yr, side] = id.split('-');
    const ev = sorted.find(e =>
      e.year === parseInt(yr) && e.side === (side === 'l' ? 'left' : 'right')
    );
    if (!ev) return;

    el.classList.add(side === 'l' ? 'active-jp' : 'active-tw');

    /* 更新詳細面板 */
    const box = document.getElementById('detail-box');
    box.className = 'detail-box ' + (side === 'l' ? 'jp' : 'tw');
    box.innerHTML = `
      <span class="d-tag" style="background:${ev.bg};color:${ev.tx}">${ev.tag} · ${ev.year} 年</span>
      <h2>${ev.title}</h2>
      <p class="d-sub">${ev.sub}</p>
      <p>${ev.desc}</p>
    `;

    /* 滾動至詳細面板 */
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
